{% extends 'base.html' %}
{% block title %}Staff Log In{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Staff log in</h2>
  <form action="{{ url_for('auth.staff_login') }}" method="post">
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button class="btn" type="submit">Log in</button>
  </form>
</div>
{% endblock %}
