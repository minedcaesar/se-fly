{% extends 'base.html' %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Log in</h2>

  <!-- In production this is a "Sign in with Google" button that redirects to the
       OAuth consent screen. For the deliverable it's mocked with a plain form. -->
  <form action="{{ url_for('auth.oauth_mock') }}" method="post">
    <label>Email
      <input type="email" name="email" required>
    </label>
    <button class="btn" type="submit">Continue with Google (mock)</button>
  </form>

  <p class="form-footer">
    Staff member? <a href="{{ url_for('auth.staff_login') }}">Log in here</a>.
  </p>
</div>
{% endblock %}
