{% extends 'base.html' %}
{% block title %}Add Schedule{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Add flight schedule</h2>
  <form action="{{ url_for('airline.add_schedule') }}" method="post">
    <label>Flight number
      <input type="text" name="flight_number" placeholder="AZ123" required>
    </label>
    <label>Origin (IATA)
      <input type="text" name="origin" placeholder="TN" required>
    </label>
    <label>Destination (IATA)
      <input type="text" name="destination" placeholder="FCO" required>
    </label>
    <label>Recurrence
      <select name="recurrence_rule">
        {% for r in recurrence_options %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
      </select>
    </label>
    <label>Departure date &amp; time
      <input type="datetime-local" name="departure_datetime" required>
    </label>
    <label>Arrival date &amp; time
      <input type="datetime-local" name="arrival_datetime" required>
    </label>
    <button class="btn" type="submit">Add</button>
  </form>
</div>
{% endblock %}
