{% extends 'base.html' %}
{% block title %}Users{% endblock %}
{% block content %}

<!-- staff and user management -->
<div class="page-header">
  <h1>Staff &amp; users</h1>
  <a class="btn" href="{{ url_for('admin.create_staff') }}">Add staff</a>
</div>

<!-- overview of registered user accounts -->
<table>
  <tr><th>Name</th><th>Email</th><th>Role</th><th>Airline</th></tr>

  {% for u in users %}   <!-- one row for each user account -->
  <tr>
    <td>{{ u['full_name'] }}</td>
    <td>{{ u['email'] }}</td>
    <td>{{ u['role'] }}</td>
    <td>{{ u['airline'] or '—' }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
