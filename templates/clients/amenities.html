{% extends 'base.html' %}
{% block title %}Amenities{% endblock %}
{% block content %}
<h1>Amenities</h1>

<!-- display available airport amenities -->
{% if amenities %}
<div class="card-grid">

  <!-- one purchase card each amenity -->
  {% for a in amenities %}
  <div class="card">
    <h3>{{ a['name'] }}</h3>
    <p class="price">€{{ '%.2f'|format(a['price']) }}</p>

    <!-- form to submit purchase-->
    <form action="{{ url_for('client.amenities') }}" method="post">
      <input type="hidden" name="amenity_id" value="{{ a['id'] }}">
      <button class="btn" type="submit">Buy</button>
    </form>
  </div>
  {% endfor %}
</div>
{% else %}<p class="empty">No amenities available right now.</p>{% endif %}
{% endblock %}
